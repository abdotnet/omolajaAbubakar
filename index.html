                    <div className="grid lg:grid-cols-12 gap-16 items-start">
                        <div className="lg:col-span-5 space-y-8">
                            <div className="space-y-4">
                                <span className="text-xs font-mono uppercase text-cyan-400 tracking-widest">// HANDSHAKE PROTOCOL</span>
                                <h1 className="text-4xl font-light text-white leading-tight tracking-tight">
                                    Let’s Build Something <br />
                                    <span className="italic font-serif font-semibold text-gradient bg-gradient-to-r from-white to-cyan-400">Highly Available</span>
                                </h1>
                                <p className="text-sm text-slate-400 font-light leading-relaxed">
                                    Seeking specialized consulting pipelines, backend framework transformations, or scalable ecosystem optimization metrics? Send over your scope configurations.
                                </p>
                            </div>

                            <div className="space-y-4 border-t border-white/5 pt-8">
                                <div className="flex items-start gap-4">
                                    <div className="w-10 h-10 rounded-lg bg-white/[0.02] border border-white/10 flex items-center justify-center text-cyan-400 flex-shrink-0">
                                        <i className="fa-solid fa-envelope-open text-xs"></i>
                                    </div>
                                    <div>
                                        <h4 className="text-xs font-mono text-slate-500 uppercase tracking-wider">Direct Endpoint</h4>
                                        <a href="mailto:abudotnet@gmail.com" className="text-sm text-white hover:text-cyan-400 font-light transition">abudotnet@gmail.com</a>
                                    </div>
                                </div>

                                <div className="flex items-start gap-4">
                                    <div className="w-10 h-10 rounded-lg bg-white/[0.02] border border-white/10 flex items-center justify-center text-cyan-400 flex-shrink-0">
                                        <i className="fa-solid fa-terminal text-xs"></i>
                                    </div>
                                    <div>
                                        <h4 className="text-xs font-mono text-slate-500 uppercase tracking-wider">Secure Signal Line</h4>
                                        <a href="tel:+2348130230146" className="text-sm text-white hover:text-cyan-400 font-light transition">+234 813 023 0146</a>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-7 bg-white/[0.01] border border-white/5 rounded-2xl p-8 lg:p-10 relative overflow-hidden">
                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div>
                                    <label className="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-2">Identifier / Name</label>
                                    <input type="text" required className="w-full bg-white/[0.01] border border-white/10 rounded-xl px-4 py-3 text-sm text-white form-input transition-all" value={formState.name} onChange={e => setFormState({...formState, name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-2">Routing Endpoint / Email</label>
                                    <input type="email" required className="w-full bg-white/[0.01] border border-white/10 rounded-xl px-4 py-3 text-sm text-white form-input transition-all" value={formState.email} onChange={e => setFormState({...formState, email: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-2">Message Payload</label>
                                    <textarea required rows="4" className="w-full bg-white/[0.01] border border-white/10 rounded-xl px-4 py-3 text-sm text-white form-input transition-all" value={formState.message} onChange={e => setFormState({...formState, message: e.target.value})}></textarea>
                                </div>
                                <button  disabled={loading} type="submit" className="w-full bg-white text-black font-mono text-xs uppercase tracking-widest py-4 rounded font-semibold hover:bg-cyan-400 transition-all">
                                     {loading ? "Dispatch Payload Completed" : "Dispatch Payload"}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('main');
            return (
                <div className="min-h-screen">
                    <Navbar currentView={view} setView={setView} />
                    {view === 'main' 
                        ? <MainPortfolio onNavigateToContact={() => setView('contact')} /> 
                        : <ContactPage onBack={() => setView('main')} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
